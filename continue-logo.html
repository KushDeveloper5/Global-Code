    <script src="js/tailwind.js"></script>
    <style>
       @keyframes marquee {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }
        .animate-marquee {
            animation: marquee 35s linear infinite;
        }
        .logos:hover .animate-marquee {
            animation-play-state: paused;
        }
    </style>
</head>
