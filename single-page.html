<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js/tailwind.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        .marquee {
            display: flex;
            width: max-content;
            animation: marquee 20s linear infinite;
        }

        .reverse {
            animation-direction: reverse;
        }

        .marquee__group {
            display: flex;
            flex-shrink: 0;
            align-items: center;
        }

        .marquee__group h2 {
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
            margin-right: 40px;
            line-height: 1.5;
            font-size: clamp(56px, 12vw, 130px);
        }

        @keyframes marquee {
            from {
                transform: translateX(0%);
            }

            to {
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

    <section class="relative h-[380px] md:h-[500px] lg:h-[650px] bg-[#2E3192] overflow-hidden">

        <!-- Top -->
        <div class="absolute top-10 md:top-20 lg:top-24 left-0 w-full overflow-hidden z-10">
            <div class="marquee">

                <div class="marquee__group">
                    <h2>FoxESS Battery</h2>
                    <h2>Solar Panel</h2>
                    <h2>Hybrid Inverter</h2>
                </div>

                <div class="marquee__group">
                    <h2>FoxESS Battery</h2>
                    <h2>Solar Panel</h2>
                    <h2>Hybrid Inverter</h2>
                </div>

            </div>
        </div>

        <!-- Image -->
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 z-30">
            <img src="https://www.solwaysky.com/wp-content/uploads/2025/01/agancy-girl.png"
                class="w-[180px] sm:w-[240px] md:w-[350px] lg:w-[720px] xl:w-[1000px] object-contain block">
        </div>

        <!-- Bottom -->
        <div class="absolute bottom-10 md:bottom-20 lg:bottom-24 left-0 w-full overflow-hidden z-40">
            <div class="marquee reverse">

                <div class="marquee__group">
                    <h2>Battery Storage</h2>
                    <h2>FoxESS</h2>
                    <h2>Solar Energy</h2>
                </div>

                <div class="marquee__group">
                    <h2>Battery Storage</h2>
                    <h2>FoxESS</h2>
                    <h2>Solar Energy</h2>
                </div>
            </div>
        </div>
    </section>

    

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
</body>
</html>
